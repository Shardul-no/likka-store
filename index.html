<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Liquor Compass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a0a;
      --amber:#f5a623;
      --amber-soft:rgba(245,166,35,.35);
      --amber-faint:rgba(245,166,35,.14);
      --text:#f3e9d2;
      --muted:rgba(243,233,210,.7);
      --danger:#ff6b6b;
      --panel:rgba(10,10,10,.72);
      --grid:rgba(245,166,35,.08);
      --glow:0 0 10px rgba(245,166,35,.55), 0 0 30px rgba(245,166,35,.22);
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    body {
      position: relative;
      display: grid;
      place-items: center;
      touch-action: manipulation;
      user-select: none;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg::before,
    .bg::after {
      content: "";
      position: absolute;
      inset: 0;
    }

    .bg::before {
      background:
        radial-gradient(circle at center, rgba(245,166,35,.08), transparent 35%),
        radial-gradient(circle at center, transparent 0 35%, rgba(245,166,35,.03) 36%, transparent 37%),
        radial-gradient(circle at center, transparent 0 61%, rgba(245,166,35,.04) 62%, transparent 63%);
      opacity: .65;
    }

    .bg::after {
      background-image:
        linear-gradient(to right, transparent 0, transparent 95%, rgba(245,166,35,.08) 100%),
        linear-gradient(to bottom, transparent 0, transparent 95%, rgba(245,166,35,.08) 100%);
      background-size: 28px 28px;
      opacity: .24;
      mask-image: radial-gradient(circle at center, black 0 42%, transparent 80%);
    }

    .radar {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .35s ease;
      background:
        radial-gradient(circle at center, transparent 0 20%, rgba(245,166,35,.08) 20.2%, transparent 20.4%),
        radial-gradient(circle at center, transparent 0 39%, rgba(245,166,35,.05) 39.2%, transparent 39.4%),
        radial-gradient(circle at center, transparent 0 58%, rgba(245,166,35,.04) 58.2%, transparent 58.4%);
    }

    .radar::after {
      content: "";
      position: absolute;
      inset: -15%;
      background: conic-gradient(from 0deg, transparent 0deg, rgba(245,166,35,.0) 0deg, rgba(245,166,35,.33) 15deg, transparent 42deg, transparent 360deg);
      mask-image: radial-gradient(circle at center, black 0 39%, transparent 73%);
      animation: sweep 2.8s linear infinite;
      filter: blur(1px);
    }

    .state-searching .radar { opacity: 1; }

    @keyframes sweep {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-items: center;
      padding: max(18px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
    }

    .hud-top,
    .hud-bottom {
      z-index: 3;
      text-align: center;
      text-shadow: 0 0 12px rgba(245,166,35,.24);
      letter-spacing: .06em;
    }

    .hud-top {
      align-self: start;
      min-height: 3.5rem;
      display: grid;
      gap: .35rem;
      justify-items: center;
    }

    .store-name {
      font-size: clamp(1rem, 3.3vw, 1.35rem);
      color: var(--text);
      max-width: min(92vw, 42rem);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity .35s ease, transform .35s ease;
    }

    .state-searching .store-name,
    .state-locked .store-name,
    .state-error .store-name,
    .state-desktop .store-name {
      opacity: .95;
      transform: translateY(0);
    }

    .status {
      color: var(--amber);
      font-size: .9rem;
      opacity: .85;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .center {
      position: relative;
      display: grid;
      place-items: center;
      height: 100%;
      min-height: 0;
    }

    .compass-shell {
      position: relative;
      width: min(72vw, 20rem);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      margin: 0 auto;
      perspective: 1200px;
      transform-style: preserve-3d;
      filter: drop-shadow(0 0 18px rgba(245,166,35,.22));
    }

    .glow-ring {
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      border: 1px solid rgba(245,166,35,.12);
      box-shadow: inset 0 0 26px rgba(245,166,35,.05);
      opacity: .75;
    }

    .pointer {
      position: absolute;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
      transform: rotate(0deg);
      transition: transform .4s ease;
      will-change: transform;
      filter: drop-shadow(0 0 10px rgba(245,166,35,.5));
    }

    .needle-float {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      transform-style: preserve-3d;
      animation: floatNeedle 4.8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes floatNeedle {
      0%, 100% { transform: translate3d(0, -8px, 22px) rotateX(12deg); }
      50% { transform: translate3d(0, 8px, 30px) rotateX(4deg); }
    }

    .pointer::before,
    .pointer::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      clip-path: polygon(50% 0, 100% 100%, 50% 82%, 0 100%);
      backface-visibility: hidden;
    }

    .pointer::before {
      width: clamp(8rem, 24vw, 11rem);
      height: clamp(13rem, 35vw, 17rem);
      background: linear-gradient(180deg, rgba(245,166,35,1) 0%, rgba(245,166,35,.82) 48%, rgba(245,166,35,.38) 100%);
      top: calc(clamp(13rem, 35vw, 17rem) * -0.83);
      box-shadow: 0 0 0 1px rgba(245,166,35,.22), 0 0 30px rgba(245,166,35,.16);
      transform: translateX(-50%) translateZ(24px);
    }

    .pointer::after {
      width: clamp(2rem, 5vw, 2.7rem);
      height: clamp(2rem, 5vw, 2.7rem);
      background: rgba(10,10,10,.95);
      border: 1px solid rgba(245,166,35,.65);
      border-radius: 50%;
      top: calc(clamp(13rem, 35vw, 17rem) * -0.06);
      box-shadow: 0 0 0 6px rgba(245,166,35,.07), 0 0 20px rgba(245,166,35,.15);
      clip-path: none;
      transform: translateX(-50%) translateZ(36px);
    }

    .state-locked .pointer::before {
      animation: pulse 1.3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translateX(-50%) translateZ(24px) scale(1); filter: brightness(1); }
      50% { transform: translateX(-50%) translateZ(24px) scale(1.03); filter: brightness(1.2); }
    }

    .center-dot {
      position: absolute;
      width: .9rem;
      height: .9rem;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: var(--glow);
      z-index: 2;
    }

    .scanlines {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(to bottom, transparent 0, transparent 97%, rgba(245,166,35,.05) 100%);
      background-size: 100% 6px;
      opacity: .18;
      pointer-events: none;
    }

    .hud-bottom {
      align-self: end;
      display: grid;
      gap: .5rem;
      justify-items: center;
      min-height: 4rem;
    }

    .nearby-panel {
      position: absolute;
      left: 50%;
      bottom: calc(max(18px, env(safe-area-inset-bottom)) + 5.2rem);
      transform: translateX(-50%);
      width: min(92vw, 34rem);
      display: grid;
      gap: .45rem;
      z-index: 4;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
    }

    .state-searching.has-nearby .nearby-panel,
    .state-locked.has-nearby .nearby-panel {
      opacity: 1;
      pointer-events: auto;
    }

    .nearby-title {
      font-size: .72rem;
      letter-spacing: .18em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
    }

    .nearby-list {
      display: grid;
      gap: .45rem;
      max-height: 34vh;
      overflow: auto;
      padding-right: .15rem;
    }

    .nearby-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .35rem .75rem;
      width: 100%;
      border: 1px solid rgba(245,166,35,.22);
      background: rgba(10,10,10,.82);
      color: var(--text);
      font: inherit;
      text-align: left;
      padding: .72rem .85rem;
      border-radius: .9rem;
      box-shadow: 0 0 0 1px rgba(245,166,35,.05), 0 0 16px rgba(245,166,35,.05);
      cursor: pointer;
      backdrop-filter: blur(8px);
    }

    .nearby-item:hover {
      border-color: rgba(245,166,35,.45);
    }

    .nearby-item[aria-pressed="true"] {
      border-color: rgba(245,166,35,.62);
      background: rgba(245,166,35,.08);
      box-shadow: 0 0 0 1px rgba(245,166,35,.14), 0 0 22px rgba(245,166,35,.13);
    }

    .nearby-name {
      font-size: .9rem;
      letter-spacing: .05em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nearby-meta {
      font-size: .72rem;
      letter-spacing: .1em;
      color: var(--muted);
      text-transform: uppercase;
      justify-self: end;
    }

    .nearby-action {
      grid-column: 1 / -1;
      font-size: .68rem;
      letter-spacing: .14em;
      color: rgba(243,233,210,.62);
      text-transform: uppercase;
    }

    .distance {
      font-size: clamp(1.1rem, 3.7vw, 1.5rem);
      color: var(--text);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .35s ease, transform .35s ease;
    }

    .state-locked .distance {
      opacity: 1;
      transform: translateY(0);
    }

    .subtext {
      font-size: .82rem;
      color: var(--muted);
      max-width: min(92vw, 42rem);
      line-height: 1.35;
      min-height: 1.2rem;
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    .recalibrate {
      position: absolute;
      right: max(18px, env(safe-area-inset-right));
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 4;
      border: 1px solid rgba(245,166,35,.35);
      background: rgba(10,10,10,.86);
      color: var(--amber);
      font: inherit;
      font-size: .75rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: .7rem .85rem;
      border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(245,166,35,.06), 0 0 24px rgba(245,166,35,.08);
      backdrop-filter: blur(8px);
      cursor: pointer;
    }

    .recalibrate:active {
      transform: translateY(1px);
    }

    .desktop-note {
      display: none;
      margin-top: .5rem;
      color: var(--muted);
      font-size: .82rem;
      letter-spacing: .08em;
      max-width: min(92vw, 38rem);
    }

    .state-desktop .desktop-note { display: block; }
    .state-desktop .pointer {
      opacity: .6;
      filter: saturate(.7);
    }
    .state-desktop .compass-shell::after {
      content: 'COMPASS UNAVAILABLE';
      position: absolute;
      left: 50%;
      bottom: -1.2rem;
      transform: translateX(-50%);
      padding: .28rem .55rem;
      border-radius: 999px;
      border: 1px solid rgba(245,166,35,.25);
      background: rgba(10,10,10,.78);
      color: var(--muted);
      font-size: .56rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      white-space: nowrap;
      pointer-events: none;
    }

    @media (hover: none) and (pointer: coarse) {
      .app {
        padding-bottom: calc(max(18px, env(safe-area-inset-bottom)) + 5.5rem);
      }

      .nearby-panel {
        bottom: calc(max(18px, env(safe-area-inset-bottom)) + 8.4rem);
      }

      .recalibrate {
        bottom: calc(max(18px, env(safe-area-inset-bottom)) + 4.2rem);
      }
    }

    .launch-panel {
      display: grid;
      gap: .5rem;
      justify-items: center;
      margin-top: .5rem;
      opacity: 1;
      transition: opacity .25s ease, transform .25s ease;
    }

    .launch-panel.hidden {
      opacity: 0 !important;
      transform: translateY(-8px) !important;
      pointer-events: none;
    }

    .launch-button {
      border: 1px solid rgba(245,166,35,.4);
      background: linear-gradient(180deg, rgba(245,166,35,.2), rgba(10,10,10,.92));
      color: var(--text);
      font: inherit;
      font-size: .78rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      padding: .8rem 1rem;
      border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(245,166,35,.08), 0 0 26px rgba(245,166,35,.12);
      backdrop-filter: blur(10px);
      cursor: pointer;
    }

    .launch-button:active {
      transform: translateY(1px);
    }

    .launch-copy {
      color: var(--muted);
      font-size: .74rem;
      letter-spacing: .08em;
      max-width: min(90vw, 34rem);
      text-align: center;
      line-height: 1.35;
      text-transform: uppercase;
    }

    .error {
      color: var(--danger);
    }

    .hidden {
      opacity: 0 !important;
      transform: translateY(10px) !important;
      pointer-events: none;
    }

    @media (min-width: 900px) and (pointer: fine) {
      .compass-shell { width: min(35vw, 18rem); }
      .pointer::before {
        width: 9rem;
        height: 14rem;
        top: -11.6rem;
      }
      .pointer::after {
        top: -.85rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="radar"></div>
    <div class="scanlines"></div>
  </div>

  <main class="app state-searching" id="app">
    <section class="hud-top">
    <div class="store-name" id="storeName" aria-live="polite" aria-atomic="true">SCANNING...</div>
    <div class="status" id="status" aria-live="polite" aria-atomic="true">REQUESTING LOCATION</div>
      <div class="desktop-note" id="desktopNote">Open this on a mobile device with compass support to get live waypoint guidance.</div>
      <div class="launch-panel" id="launchPanel">
        <button class="launch-button" id="startBtn" type="button">Enable Location + Motion</button>
        <div class="launch-copy">Tap once to request your phone's location and compass access, then we can point to the shop.</div>
      </div>
    </section>

    <section class="center" aria-label="Waypoint compass">
      <div class="compass-shell" aria-hidden="true">
        <div class="glow-ring"></div>
        <div class="needle-float">
          <div class="pointer" id="pointer"></div>
        </div>
        <div class="center-dot"></div>
      </div>
    </section>

    <section class="hud-bottom">
      <div class="distance" id="distance" aria-live="polite" aria-atomic="true">--</div>
      <div class="subtext" id="subtext">SCANNING...</div>
    </section>

    <section class="nearby-panel" id="nearbyPanel" aria-label="Nearby alternatives" hidden>
      <div class="nearby-title">Other Closest Targets</div>
      <div class="nearby-list" id="nearbyList"></div>
    </section>

    <button class="recalibrate" id="recalibrate" type="button">Recalibrate</button>
  </main>

  <script>
    (() => {
      const app = document.getElementById('app');
      const pointer = document.getElementById('pointer');
      const statusEl = document.getElementById('status');
      const storeNameEl = document.getElementById('storeName');
      const distanceEl = document.getElementById('distance');
      const subtextEl = document.getElementById('subtext');
      const nearbyPanelEl = document.getElementById('nearbyPanel');
      const nearbyListEl = document.getElementById('nearbyList');
      const launchPanelEl = document.getElementById('launchPanel');
      const startBtn = document.getElementById('startBtn');
      const recalibrateBtn = document.getElementById('recalibrate');
      const defaultStartLabel = startBtn.textContent;

      const needsActivation = window.matchMedia('(pointer: coarse)').matches || navigator.maxTouchPoints > 0;
      let googleMapsLoader = null;

      const state = {
        geo: null,
        heading: null,
        target: null,
        candidates: [],
        lockBeepPlayed: false,
        audioCtx: null,
        audioUnlocked: false,
        orientationActive: false,
        absoluteHeadingReceived: false,
        orientationFallbackActive: false,
        pointerUpdateTimer: null,
        geoWatchActive: false,
        useDesktopFallback: !('DeviceOrientationEvent' in window),
        watchId: null,
        overpassDisabled: location.protocol === 'file:',
        started: false,
        starting: false,
      };

      function setState(name) {
        app.classList.remove('state-searching', 'state-locked', 'state-error', 'state-desktop');
        app.classList.add(name);
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatDistanceLabel(distanceMeters) {
        if (!Number.isFinite(distanceMeters)) return '--';
        if (distanceMeters < 1000) return `${Math.max(1, Math.round(distanceMeters))} m`;
        return `${(distanceMeters / 1000).toFixed(distanceMeters >= 10000 ? 0 : 1)} km`;
      }

      function renderNearbyList() {
        nearbyListEl.replaceChildren();
        const currentId = state.target?.id;
        const others = state.candidates.filter(place => place.id !== currentId).slice(0, 5);
        nearbyPanelEl.hidden = !others.length;
        app.classList.toggle('has-nearby', others.length > 0);
        for (const place of others) {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'nearby-item';
          button.setAttribute('aria-pressed', 'false');
          button.innerHTML = `
            <div class="nearby-name">${escapeHtml(place.name || 'Unknown liquor store')}</div>
            <div class="nearby-meta">${escapeHtml(formatDistanceLabel(place.distance))}</div>
            <div class="nearby-action">${escapeHtml(place.kind || 'Target')} · Tap to lock</div>
          `;
          button.addEventListener('click', async () => {
            await unlockAudio();
            setLockedTarget(place, true);
          });
          nearbyListEl.appendChild(button);
        }
      }

      function setStatus(text, kind = '') {
        statusEl.textContent = text;
        statusEl.classList.toggle('error', kind === 'error');
      }

      function setSubtext(text) {
        subtextEl.textContent = text;
      }

      function setStoreName(text) {
        storeNameEl.textContent = text;
      }

      function setLaunchPanelVisible(visible, label = '') {
        launchPanelEl.classList.toggle('hidden', !visible);
        startBtn.textContent = label || defaultStartLabel;
        startBtn.disabled = !visible;
        if (!visible) startBtn.setAttribute('aria-hidden', 'true');
        else startBtn.removeAttribute('aria-hidden');
      }

      function setDistance(distanceMeters) {
        if (!Number.isFinite(distanceMeters)) {
          distanceEl.textContent = '--';
          return;
        }
        if (distanceMeters < 1000) {
          distanceEl.textContent = `${Math.max(1, Math.round(distanceMeters))} m away`;
        } else {
          distanceEl.textContent = `${(distanceMeters / 1000).toFixed(distanceMeters >= 10000 ? 0 : 1)} km away`;
        }
      }

      function formatWalkTime(distanceMeters) {
        const km = distanceMeters / 1000;
        const minutes = Math.max(1, Math.round((km / 4.8) * 60));
        if (minutes < 60) return `Walk time ~${minutes} min`;
        const hours = Math.floor(minutes / 60);
        const rem = minutes % 60;
        return `Walk time ~${hours}h ${rem}m`;
      }

      function formatTargetSubtext(place, { desktop = false } = {}) {
        const source = place?.source || 'Nearby target';
        if (!place || !Number.isFinite(place.distance) || place.distance > 3000) {
          return desktop ? `${source} · open on mobile for live compass heading` : source;
        }
        const travel = formatWalkTime(place.distance);
        return desktop
          ? `${travel} · open on mobile for live compass heading`
          : `${travel} - ${source}`;
      }

      function normalizeHeading(evt) {
        if (typeof evt.webkitCompassHeading === 'number') {
          return evt.webkitCompassHeading;
        }
        if (typeof evt.alpha === 'number') {
          const screenAngle = (screen.orientation && typeof screen.orientation.angle === 'number')
            ? screen.orientation.angle
            : 0;
          return ((360 - evt.alpha) + screenAngle) % 360;
        }
        return null;
      }

      function angleDifference(a, b) {
        let diff = (a - b + 540) % 360 - 180;
        return diff;
      }

      function bearingBetween(lat1, lon1, lat2, lon2) {
        const toRad = deg => deg * Math.PI / 180;
        const toDeg = rad => rad * 180 / Math.PI;
        const dLon = toRad(lon2 - lon1);
        const y = Math.sin(dLon) * Math.cos(toRad(lat2));
        const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
                  Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
        return (toDeg(Math.atan2(y, x)) + 360) % 360;
      }

      function haversineMeters(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const toRad = deg => deg * Math.PI / 180;
        const dLat = toRad(lat2 - lat1);
        const dLon = toRad(lon2 - lon1);
        const a = Math.sin(dLat / 2) ** 2 +
          Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
        return 2 * R * Math.asin(Math.sqrt(a));
      }

      function rotatePointer() {
        if (!state.target || !state.geo) return;
        if (state.heading == null) {
          if (state.useDesktopFallback && Number.isFinite(state.target.bearing)) {
            pointer.style.transform = `rotate(${state.target.bearing}deg)`;
          } else {
            pointer.style.transform = 'rotate(0deg)';
          }
          return;
        }
        const targetBearing = bearingBetween(state.geo.lat, state.geo.lon, state.target.lat, state.target.lon);
        const relative = angleDifference(targetBearing, state.heading);
        pointer.style.transform = `rotate(${relative}deg)`;
      }

      function schedulePointerUpdate() {
        if (state.pointerUpdateTimer) return;
        state.pointerUpdateTimer = window.setTimeout(() => {
          state.pointerUpdateTimer = null;
          rotatePointer();
        }, 80);
      }

      function syncLockedTargetDisplay() {
        if (!state.target) return;
        setStoreName(state.target.name || 'Unknown liquor store');
        setDistance(state.target.distance);
        setSubtext(formatTargetSubtext(state.target));
      }

      function refreshCandidatesForGeo() {
        if (!state.geo || !state.candidates.length) return;
        const { lat, lon } = state.geo;
        const currentTargetId = state.target?.id;
        state.candidates = state.candidates
          .map(place => ({
            ...place,
            distance: haversineMeters(lat, lon, place.lat, place.lon),
            bearing: bearingBetween(lat, lon, place.lat, place.lon),
          }))
          .sort((a, b) => a.distance - b.distance);
        if (currentTargetId) {
          const updatedTarget = state.candidates.find(place => place.id === currentTargetId);
          if (updatedTarget) {
            state.target = updatedTarget;
            if (state.useDesktopFallback) {
              activateDesktopMode(updatedTarget);
            } else {
              syncLockedTargetDisplay();
            }
          }
        }
        renderNearbyList();
      }

      function applyGeoUpdate(pos) {
        state.geo = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        refreshCandidatesForGeo();
        schedulePointerUpdate();
      }

      function startGeoWatch() {
        if (!navigator.geolocation || state.geoWatchActive) return;
        state.watchId = navigator.geolocation.watchPosition(
          pos => {
            applyGeoUpdate(pos);
          },
          () => {},
          {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0,
          }
        );
        state.geoWatchActive = true;
      }

      function stopGeoWatch() {
        if (state.watchId != null && navigator.geolocation?.clearWatch) {
          navigator.geolocation.clearWatch(state.watchId);
        }
        state.watchId = null;
        state.geoWatchActive = false;
      }

      async function unlockAudio() {
        if (!navigator.userActivation || !navigator.userActivation.isActive) return false;
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return;
          if (!state.audioCtx) state.audioCtx = new AC();
          if (state.audioCtx.state === 'suspended') await state.audioCtx.resume();
          state.audioUnlocked = true;
          return true;
        } catch (_) {}
        return false;
      }

      function beep() {
        if (!state.audioUnlocked || !state.audioCtx) return;
        try {
          const ctx = state.audioCtx;
          const now = ctx.currentTime;
          const gain = ctx.createGain();
          const osc = ctx.createOscillator();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(880, now);
          osc.frequency.exponentialRampToValueAtTime(1320, now + 0.05);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.05, now + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
          osc.connect(gain).connect(ctx.destination);
          osc.start(now);
          osc.stop(now + 0.2);
        } catch (_) {}
      }

      function setLockedTarget(place) {
        state.target = place;
        state.lockBeepPlayed = false;
        setState('state-locked');
        setStatus('LOCKED');
        setStoreName(place.name || 'Unknown liquor store');
        setDistance(place.distance);
        setSubtext(formatTargetSubtext(place));
        beep();
        state.lockBeepPlayed = true;
        rotatePointer();
        renderNearbyList();
      }

      function setError(message) {
        setState('state-error');
        setStatus('ERROR', 'error');
        setStoreName(message);
        distanceEl.textContent = '';
        setSubtext('Location or store scan failed');
        state.candidates = [];
        state.started = false;
        setLaunchPanelVisible(true, 'Try Again');
        renderNearbyList();
      }

      async function getCurrentPosition() {
        return new Promise((resolve, reject) => {
          if (!navigator.geolocation) {
            reject(new Error('Geolocation unavailable'));
            return;
          }
          navigator.geolocation.getCurrentPosition(resolve, reject, {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0,
          });
        });
      }

      function loadGoogleMapsPlaces(key) {
        if (window.google?.maps?.places?.PlacesService) return Promise.resolve();
        if (!googleMapsLoader) {
          googleMapsLoader = new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.dataset.googleMapsSdk = 'true';
            script.async = true;
            script.defer = true;
            script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(key)}&libraries=places`;
            script.onload = () => resolve();
            script.onerror = () => {
              googleMapsLoader = null;
              reject(new Error('Google Maps SDK failed to load'));
            };
            document.head.appendChild(script);
          });
        }
        return googleMapsLoader;
      }

      async function searchGooglePlaces(lat, lon) {
        const key = new URLSearchParams(location.search).get('googleKey') || window.GOOGLE_PLACES_API_KEY;
        if (!key) return [];
        try {
          await loadGoogleMapsPlaces(key);
        } catch (_) {
          return [];
        }
        const radius = 10000;
        const queries = [
          { keyword: 'liquor store', type: 'liquor_store', kind: 'Liquor store' },
          { keyword: 'wine shop', type: 'liquor_store', kind: 'Wine shop' },
          { keyword: 'wine', kind: 'Wine store' },
          { keyword: 'bar', type: 'bar', kind: 'Bar' },
          { keyword: 'resto bar', type: 'restaurant', kind: 'Resto bar' },
        ];
        const seen = new Map();
        const service = new google.maps.places.PlacesService(document.createElement('div'));
        const origin = new google.maps.LatLng(lat, lon);
        const nearbySearch = request => new Promise(resolve => {
          service.nearbySearch(request, (results, status) => resolve({ results, status }));
        });
        for (const query of queries) {
          try {
            const { results, status } = await nearbySearch({
              location: origin,
              radius,
              keyword: query.keyword,
              ...(query.type ? { type: query.type } : {}),
            });
            const ok = google.maps.places.PlacesServiceStatus.OK;
            const zero = google.maps.places.PlacesServiceStatus.ZERO_RESULTS;
            if (status !== ok && status !== zero) continue;
            if (!Array.isArray(results) || !results.length) continue;
            for (const r of results) {
              if (!r.geometry || !r.geometry.location) continue;
              const loc = r.geometry.location;
              const pLat = typeof loc.lat === 'function' ? loc.lat() : loc.lat;
              const pLng = typeof loc.lng === 'function' ? loc.lng() : loc.lng;
              const name = r.name || query.kind;
              const keyId = `${r.place_id || name}|${pLat.toFixed(6)}|${pLng.toFixed(6)}`;
              const candidate = {
                id: `g:${keyId}`,
                name,
                kind: query.kind,
                lat: pLat,
                lon: pLng,
                distance: haversineMeters(lat, lon, pLat, pLng),
                bearing: bearingBetween(lat, lon, pLat, pLng),
                source: 'Google Places',
              };
              const prev = seen.get(keyId);
              if (!prev || candidate.distance < prev.distance) seen.set(keyId, candidate);
            }
          } catch (_) {
            continue;
          }
        }
        return [...seen.values()].sort((a, b) => a.distance - b.distance);
      }

      async function searchOverpass(lat, lon) {
        if (state.overpassDisabled) return [];
        const radius = 7000;
        const namedVenueRegex = 'wine|wines|bar|resto\\s*bar|restobar';
        const queries = [
          `
          [out:json][timeout:20];
          (
            node(around:${radius},${lat},${lon})["shop"="alcohol"];
            way(around:${radius},${lat},${lon})["shop"="alcohol"];
            relation(around:${radius},${lat},${lon})["shop"="alcohol"];
            node(around:${radius},${lat},${lon})["shop"="wine"];
            way(around:${radius},${lat},${lon})["shop"="wine"];
            relation(around:${radius},${lat},${lon})["shop"="wine"];
            node(around:${radius},${lat},${lon})["shop"="beverages"]["name"~"${namedVenueRegex}",i];
            way(around:${radius},${lat},${lon})["shop"="beverages"]["name"~"${namedVenueRegex}",i];
            relation(around:${radius},${lat},${lon})["shop"="beverages"]["name"~"${namedVenueRegex}",i];
          );
          out center tags;
        `,
          `
          [out:json][timeout:20];
          (
            node(around:${radius},${lat},${lon})["amenity"="bar"];
            way(around:${radius},${lat},${lon})["amenity"="bar"];
            relation(around:${radius},${lat},${lon})["amenity"="bar"];
            node(around:${radius},${lat},${lon})["amenity"="pub"];
            way(around:${radius},${lat},${lon})["amenity"="pub"];
            relation(around:${radius},${lat},${lon})["amenity"="pub"];
            node(around:${radius},${lat},${lon})["amenity"="restaurant"]["name"~"${namedVenueRegex}",i];
            way(around:${radius},${lat},${lon})["amenity"="restaurant"]["name"~"${namedVenueRegex}",i];
            relation(around:${radius},${lat},${lon})["amenity"="restaurant"]["name"~"${namedVenueRegex}",i];
          );
          out center tags;
        `,
          `
          [out:json][timeout:20];
          (
            node(around:${radius},${lat},${lon})["name"~"${namedVenueRegex}",i]["shop"!="yes"];
            way(around:${radius},${lat},${lon})["name"~"${namedVenueRegex}",i]["shop"!="yes"];
            relation(around:${radius},${lat},${lon})["name"~"${namedVenueRegex}",i]["shop"!="yes"];
          );
          out center tags;
        `
        ];

        for (const query of queries) {
          try {
            const res = await fetch('https://overpass-api.de/api/interpreter', {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
              body: `data=${encodeURIComponent(query)}`
            });
            if (!res.ok) continue;
            const data = await res.json();
            const candidates = (data.elements || [])
              .map(el => {
                const point = el.lat != null ? { lat: el.lat, lon: el.lon } : el.center;
                if (!point) return null;
                const tags = el.tags || {};
                const name = tags.name || tags.brand || tags.operator || 'Liquor store';
                const kind = tags.shop === 'alcohol'
                  ? 'Liquor store'
                  : tags.amenity === 'bar'
                    ? 'Bar'
                    : tags.amenity === 'pub'
                      ? 'Pub'
                      : tags.amenity === 'restaurant'
                        ? 'Resto bar'
                        : 'Liquor store';
                return {
                  id: `o:${name}|${point.lat.toFixed(6)}|${point.lon.toFixed(6)}`,
                  name,
                  kind,
                  lat: point.lat,
                  lon: point.lon,
                  distance: haversineMeters(lat, lon, point.lat, point.lon),
                  bearing: bearingBetween(lat, lon, point.lat, point.lon),
                  source: 'OpenStreetMap',
                };
              })
              .filter(Boolean)
              .sort((a, b) => a.distance - b.distance);
            if (candidates.length) return candidates;
        } catch (err) {
          if (location.protocol === 'file:') {
            state.overpassDisabled = true;
          }
          continue;
        }
      }
      return [];
    }

      async function findNearestStore(lat, lon) {
        setState('state-searching');
        setStatus('SCANNING…');
        setStoreName('SCANNING…');
        setDistance(NaN);
        setSubtext('Searching liquor stores, wine shops, bars, and resto bars');

        const all = [];
        try {
          const google = await searchGooglePlaces(lat, lon);
          if (google.length) all.push(...google);
        } catch (_) {}

        try {
          const osm = await searchOverpass(lat, lon);
          if (osm.length) all.push(...osm);
        } catch (_) {}

        const unique = [];
        const seen = new Set();
        for (const place of all.sort((a, b) => a.distance - b.distance)) {
          const key = place.id || `${place.name}|${place.lat}|${place.lon}`;
          if (seen.has(key)) continue;
          seen.add(key);
          unique.push(place);
        }
        state.candidates = unique;
        app.classList.toggle('has-nearby', unique.length > 0);
        renderNearbyList();

        if (unique.length) return unique[0];

        if (state.overpassDisabled && !window.GOOGLE_PLACES_API_KEY && !new URLSearchParams(location.search).get('googleKey')) {
          setError('Open via localhost or add a Google Places key');
          return null;
        }

        return null;
      }

      function onHeadingEvent(evt) {
        const heading = normalizeHeading(evt);
        if (heading == null) return;
        state.heading = heading;
        if (state.target && state.geo) schedulePointerUpdate();
      }

      async function initOrientation({ silent = false } = {}) {
        if (state.orientationActive || state.useDesktopFallback) return true;
        const needsPermission = typeof DeviceOrientationEvent.requestPermission === 'function';
        if (needsPermission) {
          try {
            const result = await DeviceOrientationEvent.requestPermission();
            if (result !== 'granted') {
              if (!silent) setError('Motion permission denied');
              return false;
            }
          } catch (_) {
            if (!silent) setError('Motion permission unavailable');
            return false;
          }
        }

        state.absoluteHeadingReceived = false;
        state.orientationFallbackActive = false;
        const absoluteListener = evt => {
          const before = state.absoluteHeadingReceived;
          onHeadingEvent(evt);
          if (normalizeHeading(evt) == null) return;
          state.absoluteHeadingReceived = true;
          if (!before && state.orientationFallbackActive) {
            window.removeEventListener('deviceorientation', onHeadingEvent, true);
            state.orientationFallbackActive = false;
          }
        };
        window.addEventListener('deviceorientationabsolute', absoluteListener, true);
        window.setTimeout(() => {
          if (state.absoluteHeadingReceived || state.useDesktopFallback) return;
          window.addEventListener('deviceorientation', onHeadingEvent, true);
          state.orientationFallbackActive = true;
        }, 1000);
        state.orientationAbsoluteListener = absoluteListener;
        state.orientationActive = true;
        return true;
      }

      function activateDesktopMode(place) {
        setState('state-desktop');
        setStatus('DESKTOP MODE');
        setStoreName(place?.name || 'Compass unavailable on desktop');
        distanceEl.textContent = Number.isFinite(place?.bearing)
          ? `BEARING ${Math.round(place.bearing)}°`
          : 'BEARING --';
        setSubtext(formatTargetSubtext(place, { desktop: true }));
        if (place && Number.isFinite(place.bearing)) {
          pointer.style.transform = `rotate(${place.bearing}deg)`;
        } else {
          pointer.style.transform = 'rotate(0deg)';
        }
      }

      async function start() {
        if (state.starting) return;
        state.starting = true;
        state.started = true;
        setLaunchPanelVisible(true, 'REQUESTING PERMISSIONS...');
        startBtn.disabled = true;
        if (!state.useDesktopFallback) {
          const motionOk = await initOrientation({ silent: false });
          if (!motionOk) {
            state.starting = false;
            state.started = false;
            return;
          }
        }
        try {
          const pos = await getCurrentPosition();
          applyGeoUpdate(pos);
          startGeoWatch();
        } catch (err) {
          state.starting = false;
          state.started = false;
          setError(err && err.code === 1 ? 'Location denied' : 'Location unavailable');
          return;
        }

        const store = await findNearestStore(state.geo.lat, state.geo.lon);
        if (!store) {
          state.starting = false;
          state.started = false;
          setError('No liquor stores found nearby');
          return;
        }
        setLockedTarget(store);
        setLaunchPanelVisible(false);
        state.starting = false;
        if (state.useDesktopFallback) {
          activateDesktopMode(store);
        }
      }

      async function recalibrate() {
        state.heading = null;
        state.target = null;
        state.lockBeepPlayed = false;
        setState('state-searching');
        setStatus('SCANNING…');
        setStoreName('SCANNING…');
        setDistance(NaN);
        setSubtext('Recalibrating waypoint...');
        unlockAudio();
        if (state.geo) {
          if (!state.useDesktopFallback) {
            await initOrientation({ silent: true }).catch(() => {});
          }
          try {
            const store = await findNearestStore(state.geo.lat, state.geo.lon);
            if (!store) {
              setError('No liquor stores found nearby');
              return;
            }
            setLockedTarget(store);
            if (state.useDesktopFallback) {
              activateDesktopMode(store);
            }
          } catch (_) {
            setError('Store scan failed');
          }
        } else if (!state.starting) {
          await start();
        }
      }

      recalibrateBtn.addEventListener('click', async () => {
        await unlockAudio();
        if (!state.useDesktopFallback) {
          if (!state.geo) {
            await start();
            return;
          }
          await initOrientation();
          await recalibrate();
        } else {
          if (!state.geo) {
            await start();
            return;
          }
          await recalibrate();
        }
      });

      startBtn.addEventListener('click', async () => {
        await unlockAudio();
        await start();
      });

      window.addEventListener('pointerdown', unlockAudio, { passive: true });
      window.addEventListener('touchstart', unlockAudio, { passive: true });
      window.addEventListener('click', unlockAudio, { passive: true });

      if (needsActivation) {
        setState('state-searching');
        setStatus('TAP TO ENABLE');
        setStoreName('READY WHEN YOU ARE');
        setSubtext('Tap once to request location and compass access');
        setLaunchPanelVisible(true);
      } else {
        setLaunchPanelVisible(false);
        start();
      }
    })();
  </script>
</body>
</html>
